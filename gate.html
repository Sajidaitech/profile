<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajid Mehmood | Portfolio</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gate-standalone.css">
</head>
<body>

    <!-- Background decoration -->
    <div class="bg-deco">
        <div class="bg-deco-circle c1"></div>
        <div class="bg-deco-circle c2"></div>
        <div class="bg-deco-line l1"></div>
        <div class="bg-deco-line l2"></div>
        <div class="bg-deco-line l3"></div>
    </div>

    <!-- Gate Card -->
    <div class="gate-card">
        <div class="card-stripe"></div>
        <div class="card-body">

            <!-- Logo -->
            <div class="card-logo">
                <img src="logo.png" alt="SM Logo">
                <div class="card-logo-text">
                    <span class="card-logo-name">Sajid Mehmood</span>
                    <span class="card-logo-sub">IT Systems Engineer</span>
                </div>
            </div>

            <div class="card-divider"></div>

            <!-- Welcome Text -->
            <div class="card-welcome">
                <span class="card-eyebrow">Welcome</span>
                <h1 class="card-headline">Who's <em>visiting</em><br>today?</h1>
                <p class="card-sub">Enter your name to view the portfolio. Takes 2 seconds!</p>
            </div>

            <!-- Input -->
            <div class="input-group">
                <label class="input-label" for="gVisitorName">Your Name</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input
                        type="text"
                        id="gVisitorName"
                        class="name-input"
                        placeholder="e.g. Ahmed, Sarah, HR Team..."
                        autocomplete="off"
                        maxlength="40"
                    >
                </div>
                <p class="error-msg" id="gErrorMsg">⚠ Please enter your name to continue.</p>
            </div>

            <!-- Submit -->
            <button class="submit-btn" id="gSubmitBtn" onclick="gateSubmit()">
                <span class="btn-text">View Portfolio</span>
                <span class="btn-arrow">→</span>
                <div class="spinner"></div>
            </button>

            <!-- Skip -->
            <span class="skip-link" onclick="gateSkip()">Skip — view anonymously</span>

            <!-- Hidden test button: visit gate.html?test=1 to reveal it -->
            <div id="testBtnWrap" style="display:none;margin-top:14px;text-align:center;">
                <button onclick="testTelegram()" style="background:none;border:1px dashed #C5A059;color:#C5A059;padding:8px 18px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;">
                    🔔 Test Telegram Bot
                </button>
                <p id="testResult" style="font-size:11px;margin-top:8px;color:#718096;"></p>
            </div>

        </div>

        <!-- Footer -->
        <div class="card-footer">
            <span class="card-footer-left">
                <span class="avail-dot"></span>Open to Opportunities
            </span>
            <span class="card-footer-right">CCNA · Doha, Qatar</span>
        </div>

        <!-- Success state (inside card) -->
        <div class="success-state" id="gSuccess">
            <div class="success-icon">✨</div>
            <div class="success-name" id="gSuccessName">Welcome!</div>
            <div class="success-sub">Wait its Loading ...</div>
        </div>
    </div>

    <script src="gate.js"></script>
</body>
</html>
